version: '3.9'

services:
  laravel:
    build:
      context: ./stocker-admin
      dockerfile: Dockerfile
    environment:
      APP_NAME: Stocker
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: stocker
      DB_USERNAME: stocker
      DB_PASSWORD: stocker123
      SESSION_DRIVER: file
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - laravel_storage:/var/www/storage
    restart: unless-stopped

  nginx:
    image: docker.io/library/nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./stocker-admin:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - laravel
    restart: unless-stopped

  db:
    image: docker.io/library/mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: stocker
      MYSQL_USER: stocker
      MYSQL_PASSWORD: stocker123
    volumes:
      - mysql_data:/var/lib/mysql
      - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "stocker", "-pstocker123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  mysql_data:
  laravel_storage:
